name: Release

on:
  push:
    tags: ['v*']

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release if not exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" > /dev/null 2>&1 \
            || gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --generate-notes \
              --title "${{ github.ref_name }}"

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - { goos: darwin,  goarch: amd64, suffix: darwin-amd64  }
          - { goos: darwin,  goarch: arm64, suffix: darwin-arm64  }
          - { goos: linux,   goarch: amd64, suffix: linux-amd64   }
          - { goos: linux,   goarch: arm64, suffix: linux-arm64   }
          - { goos: windows, goarch: amd64, suffix: windows-amd64, ext: .exe }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X github.com/tyler/podcast-migrate/cmd.version=${{ github.ref_name }}" \
            -o podcast-migrate-${{ matrix.suffix }}${{ matrix.ext }} \
            .
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            podcast-migrate-${{ matrix.suffix }}${{ matrix.ext }} \
            --repo "${{ github.repository }}" \
            --clobber
