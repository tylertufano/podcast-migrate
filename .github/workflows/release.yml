name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - { goos: darwin,  goarch: amd64, suffix: darwin-amd64  }
          - { goos: darwin,  goarch: arm64, suffix: darwin-arm64  }
          - { goos: linux,   goarch: amd64, suffix: linux-amd64   }
          - { goos: linux,   goarch: arm64, suffix: linux-arm64   }
          - { goos: windows, goarch: amd64, suffix: windows-amd64, ext: .exe }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X github.com/tyler/podcast-migrate/cmd.version=${{ github.ref_name }}" \
            -o podcast-migrate-${{ matrix.suffix }}${{ matrix.ext }} \
            .
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: podcast-migrate-${{ matrix.suffix }}${{ matrix.ext }}
